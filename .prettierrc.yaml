printWidth: 120
tabWidth: 2
useTabs: false
semi: false
singleQuote: true
quoteProps: as-needed
jsxSingleQuote: false
trailingComma: all
bracketSpacing: true
bracketSameLine: false
arrowParens: always
singleAttributePerLine: false

overrides:
  - files: '*.{css,scss,sass,less}'
    options:
      singleQuote: false

# prettier-plugin-tailwindcss
tailwindFunctions: [cn]
tailwindStylesheet: ./ui/globals.css

# prettier-plugin-sort-imports
importOrder:
  - '<BUILTIN_MODULES>'
  - ''
  - '<THIRD_PARTY_MODULES>'
  - ''
  - '^/'
  - '^\.'

plugins:
  - '@ianvs/prettier-plugin-sort-imports'
  - 'prettier-plugin-tailwindcss'
